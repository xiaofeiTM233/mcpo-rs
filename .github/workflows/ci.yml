name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
    paths-ignore:
      - "*.md"
      - "LICENSE"
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. v0.1.0)"
        required: true
        type: string

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.meta.outputs.is_release }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - id: meta
        run: |
          is_release=false
          tag=""
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            is_release=true
            tag="${GITHUB_REF#refs/tags/}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            is_release=true
            tag="${{ inputs.version }}"
          fi
          echo "is_release=$is_release" >> $GITHUB_OUTPUT
          echo "tag=$tag" >> $GITHUB_OUTPUT
        shell: bash

  changelog:
    name: Changelog
    needs: check
    if: needs.check.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: npx changelogithub --draft --name ${{ needs.check.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build (${{ matrix.target }})
    needs: [check, changelog]
    if: ${{ !cancelled() && needs.check.result == 'success' && (needs.changelog.result == 'success' || needs.changelog.result == 'skipped') }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: mcpo-linux-x86_64
            strip: true

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: mcpo-linux-aarch64
            cross: true

          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: mcpo-linux-musl
            musl: true

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: mcpo-macos-x86_64
            strip: true

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: mcpo-macos-aarch64
            strip: true

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: mcpo-windows-x86_64
            strip: true

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.musl
        run: sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Strip
        if: matrix.strip && (runner.os != 'Windows')
        run: strip target/${{ matrix.target }}/release/mcpo

      - name: Rename binary
        shell: bash
        run: |
          src=mcpo
          [[ "${{ runner.os }}" == "Windows" ]] && src=mcpo.exe
          mv target/${{ matrix.target }}/release/$src target/${{ matrix.target }}/release/${{ matrix.artifact }}${src#mcpo}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}*

  release:
    name: Upload release assets
    needs: [check, build, changelog]
    if: ${{ !cancelled() && needs.check.outputs.is_release == 'true' }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets

      - name: Upload release assets
        shell: bash
        run: |
          cd assets
          for dir in *; do
            for file in "$dir"/*; do
              ext=""
              [[ "$file" == *.exe ]] && ext=".exe"
              mv "$file" "${dir}-${{ needs.check.outputs.tag }}${ext}"
            done
            rmdir "$dir"
          done
          gh release upload ${{ needs.check.outputs.tag }} * --clobber --repo ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
